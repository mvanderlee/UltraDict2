name: test

on:
  push:
    branches:
      - main
    # Docs and benchmarks ship no importable code, so a change to them alone cannot
    # break the suite or the wheels. Keep this list in sync with the pull_request one.
    paths-ignore:
      - 'readme.md'
      - 'docs/**'
      - 'tests/performance/**'
  pull_request:
    paths-ignore:
      - 'readme.md'
      - 'docs/**'
      - 'tests/performance/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv run --only-group dev pre-commit run --all-files --show-diff-on-failure

  # fast signal: run the suite against the pure-python source on native runners
  test-native:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is amd64, macos-latest is arm64, ubuntu-latest is x86_64
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python }}

      # --no-install-project: this job exercises the pure-python source in the
      # checkout, so only the runtime dependencies are needed
      # --no-dev: uv installs the dev group by default; the lint tooling has no
      # business in the environment under test
      - name: Install dependencies
        run: uv sync --locked --no-install-project --no-dev

      - name: Run unit tests
        run: uv run --no-sync python -m unittest

  # same job the release runs: build and test the compiled wheels on every
  # supported platform
  build-wheels:
    uses: ./.github/workflows/_reusable-build-wheels.yml
