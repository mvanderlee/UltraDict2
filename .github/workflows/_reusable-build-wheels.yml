name: build-wheels


on:
  workflow_call:


jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "win32-x86"
            os: windows-latest
            arch: x86
          - name: "win32-amd64"
            os: windows-latest
            arch: AMD64
          - name: "win32-arm64"
            os: windows-latest
            arch: ARM64

          - name: "macos-x86_64"
            os: macos-latest
            arch: x86_64
          - name: "macos-arm64"
            os: macos-latest
            arch: arm64
          - name: "macos-universal2"
            os: macos-latest
            arch: universal2

          # linux entries are split per libc so a manylinux failure doesn't
          # mask a musllinux one (and vice versa)
          - name: "linux-i386-manylinux"
            os: ubuntu-latest
            arch: i686
            platform: i386
            build: "cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*"
          - name: "linux-i386-musllinux"
            os: ubuntu-latest
            arch: i686
            platform: i386
            build: "cp311-musllinux* cp312-musllinux* cp313-musllinux* cp314-musllinux*"
          - name: "linux-x86_64-manylinux"
            os: ubuntu-latest
            arch: x86_64
            platform: x86_64
            build: "cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*"
          - name: "linux-x86_64-musllinux"
            os: ubuntu-latest
            arch: x86_64
            platform: x86_64
            build: "cp311-musllinux* cp312-musllinux* cp313-musllinux* cp314-musllinux*"
          - name: "linux-aarch64-manylinux"
            os: ubuntu-latest
            arch: aarch64
            platform: aarch64
            build: "cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*"
          - name: "linux-aarch64-musllinux"
            os: ubuntu-latest
            arch: aarch64
            platform: aarch64
            build: "cp311-musllinux* cp312-musllinux* cp313-musllinux* cp314-musllinux*"
          - name: "linux-ppc64le-manylinux"
            os: ubuntu-latest
            arch: ppc64le
            platform: ppc64le
            build: "cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*"
          - name: "linux-ppc64le-musllinux"
            os: ubuntu-latest
            arch: ppc64le
            platform: ppc64le
            build: "cp311-musllinux* cp312-musllinux* cp313-musllinux* cp314-musllinux*"
          - name: "linux-s390x-manylinux"
            os: ubuntu-latest
            arch: s390x
            platform: s390x
            build: "cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*"
          - name: "linux-s390x-musllinux"
            os: ubuntu-latest
            arch: s390x
            platform: s390x
            build: "cp311-musllinux* cp312-musllinux* cp313-musllinux* cp314-musllinux*"

    steps:
      - uses: actions/checkout@v7
        with:
          # full history and tags so setuptools-scm can derive the version
          fetch-depth: 0
      - uses: actions/setup-python@v6

      - name: Set up QEMU
        if: ${{ startsWith(matrix.config.os, 'ubuntu') }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.config.platform }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          # the compiled extension is interpreter-specific, one wheel per CPython
          CIBW_BUILD: ${{ matrix.config.build || 'cp311-* cp312-* cp313-* cp314-*' }}
          CIBW_ARCHS: ${{ matrix.config.arch }}
          # import check hits the installed wheel (compiled extension); the
          # suite needs the project root cwd because tests exec examples/*.py
          CIBW_TEST_COMMAND: python -c "import UltraDict2" && cd {project} && python -m unittest
          # windows cmd needs /d to change drives (runner temp is C:, checkout is D:)
          CIBW_TEST_COMMAND_WINDOWS: python -c "import UltraDict2" && cd /d {project} && python -m unittest
          # cffi (via atomics2) lacks prebuilt wheels on some arch/python
          # combos; its source build needs libffi headers
          CIBW_BEFORE_TEST_LINUX: yum -y install libffi-devel || apk add --no-cache libffi-dev
          # no repair: delvewheel fails cross-building arm64 (no ARM64
          # vcruntime on the x64 host) and python ships vcruntime140 itself
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.config.name }}
          path: ./wheelhouse/*.whl
